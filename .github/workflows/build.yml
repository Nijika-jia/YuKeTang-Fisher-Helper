name: Build Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: YuketangHelper-Windows
            ext: .exe
          - os: macos-latest
            artifact: YuketangHelper-macOS
            ext: ""
          - os: ubuntu-latest
            artifact: YuketangHelper-Linux
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies and build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller YuketangHelper.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/YuketangHelper${{ matrix.ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/YuketangHelper-Windows/YuketangHelper.exe release/YuketangHelper-Windows.exe
          cp artifacts/YuketangHelper-macOS/YuketangHelper release/YuketangHelper-macOS
          cp artifacts/YuketangHelper-Linux/YuketangHelper release/YuketangHelper-Linux
          chmod +x release/YuketangHelper-macOS release/YuketangHelper-Linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/YuketangHelper-Windows.exe
            release/YuketangHelper-macOS
            release/YuketangHelper-Linux
